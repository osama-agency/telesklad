name: 🚀 Deploy to Production

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    types: [ closed ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even if tests fail'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===============================
  # 1. CODE QUALITY & TESTING
  # ===============================
  quality:
    name: 🔍 Code Quality & Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci

      - name: 🧹 ESLint check
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ Type check
        run: npm run type-check
        continue-on-error: true

      - name: 📦 Test build
        run: npm run build:next

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ===============================
  # 2. PRODUCTION DEPLOYMENT
  # ===============================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: quality
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch')

    environment:
      name: production
      url: https://dsgrating.ru

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci --only=production

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: 🔐 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: 🌐 Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          PROJECT_DIR: ${{ secrets.PROJECT_DIR }}
        run: |
          echo "🚀 Starting deployment to production..."

          # Create deployment archive
          tar -czf deploy-package.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=*.log \
            .

          # Upload deployment package
          scp deploy-package.tar.gz $VPS_USER@$VPS_HOST:$PROJECT_DIR/

          # Execute deployment on VPS
          ssh $VPS_USER@$VPS_HOST << 'EOF'
            cd ${{ secrets.PROJECT_DIR }}

            # Extract deployment package
            tar -xzf deploy-package.tar.gz
            rm deploy-package.tar.gz

            # Run production deployment script
            chmod +x scripts/vps-production-deploy.sh
            ./scripts/vps-production-deploy.sh
          EOF

      - name: 🏥 Health check
        run: |
          echo "🏥 Performing health check..."
          sleep 15

          # Check if site is responding
          if curl -f -s --max-time 30 "https://dsgrating.ru/api/health" > /dev/null; then
            echo "✅ Health check passed - site is responding"
          else
            echo "❌ Health check failed - site not responding"
            exit 1
          fi

      - name: 📊 Deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Website | [https://dsgrating.ru](https://dsgrating.ru) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏥 Health Check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Deployed At | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔀 Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

  # ===============================
  # 3. NOTIFICATION
  # ===============================
  notify:
    name: 📢 Notify Team
    runs-on: ubuntu-latest
    needs: [quality, deploy]
    if: always()

    steps:
      - name: 📢 Deployment notification
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 Deployment successful!"
          echo "✅ Site is live at https://dsgrating.ru"

      - name: 🚨 Deployment failure notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "🔧 Please check the logs and fix the issues"

  # ===============================
  # 4. CLEANUP
  # ===============================
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: 🧹 Remove old deployments
        if: needs.deploy.result == 'success'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          PROJECT_DIR: ${{ secrets.PROJECT_DIR }}
        run: |
          # Setup SSH (reuse key from previous job)
          eval $(ssh-agent -s)
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" | ssh-add -
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

          # Cleanup old backups and Docker images
          ssh $VPS_USER@$VPS_HOST << 'EOF'
            cd ${{ secrets.PROJECT_DIR }}

            # Keep only last 5 backups
            find backups/ -name "backup-*.tar.gz" -type f | sort -r | tail -n +6 | xargs rm -f || true

            # Cleanup Docker
            docker system prune -f || true
            docker image prune -a -f || true
          EOF
