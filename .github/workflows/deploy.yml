name: 🚀 Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🔄 Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          # Устанавливаем переменные окружения для Telegram
          export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_RECIPIENTS }}"

          # Запускаем профессиональный скрипт деплоя
          echo "🚀 Running professional deploy script..."
          cd /opt/telesite

          # Обновляем скрипт из репозитория
          git fetch origin
          git checkout origin/main -- deploy.sh
          chmod +x deploy.sh

          # Запускаем деплой
          ./deploy.sh

    - name: 📨 Send Telegram notification to all recipients
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_RECIPIENTS }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🚀 Deployment Status: ${{ job.status }}

          📦 Repository: ${{ github.repository }}
          🔀 Branch: ${{ github.ref_name }}
          👤 Triggered by: ${{ github.actor }}
          💬 Commit: ${{ github.event.head_commit.message }}

          🔗 URL: https://dsgrating.ru
