name: 🔍 PR Quality Check

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, reopened ]

env:
  NODE_VERSION: '18'

jobs:
  # ===============================
  # 1. CODE QUALITY CHECKS
  # ===============================
  quality:
    name: 🧪 Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci

      - name: 🧹 ESLint check
        run: |
          echo "🧹 Running ESLint..."
          npm run lint 2>&1 | tee eslint-results.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::warning::ESLint found issues"
          fi
        continue-on-error: true

      - name: 🔍 Type checking
        run: |
          echo "🔍 Running TypeScript type check..."
          npm run type-check 2>&1 | tee typecheck-results.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::TypeScript type check failed"
            exit 1
          fi

      - name: 🏗️ Build test
        run: |
          echo "🏗️ Testing build process..."
          npm run build:next

      - name: 📊 Upload build for testing
        uses: actions/upload-artifact@v4
        with:
          name: pr-build-${{ github.event.pull_request.number }}
          path: .next/
          retention-days: 3

  # ===============================
  # 2. SECURITY SCAN
  # ===============================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci

      - name: 🔒 Run security audit
        run: |
          echo "🔒 Running npm security audit..."
          npm audit --audit-level moderate
        continue-on-error: true

      - name: 🛡️ Check for known vulnerabilities
        run: |
          echo "🛡️ Checking for known vulnerabilities..."
          npx audit-ci --moderate
        continue-on-error: true

  # ===============================
  # 3. DEPENDENCY CHECK
  # ===============================
  dependencies:
    name: 📦 Dependency Analysis
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔍 Check for dependency updates
        run: |
          echo "🔍 Checking for outdated dependencies..."
          npm outdated || true

      - name: 📊 Analyze bundle size
        run: |
          echo "📊 Analyzing bundle size..."
          npm ci
          npm run build:next
          npx @next/bundle-analyzer || true

  # ===============================
  # 4. PR SUMMARY
  # ===============================
  summary:
    name: 📋 PR Summary
    runs-on: ubuntu-latest
    needs: [quality, security, dependencies]
    if: always()

    steps:
      - name: 📋 Generate PR summary
        run: |
          echo "## 🔍 PR Quality Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Quality | ${{ needs.quality.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security | ${{ needs.security.result == 'success' && '✅ Passed' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Dependencies | ${{ needs.dependencies.result == 'success' && '✅ Analyzed' || '⚠️ Issues' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.quality.result }}" == "success" ]]; then
            echo "✅ **This PR is ready for review and merge!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **This PR needs fixes before it can be merged.**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Code review by team members" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Manual testing if needed" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Merge to trigger production deployment" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Comment PR status
        if: needs.quality.result == 'success'
        run: |
          echo "✅ All quality checks passed! This PR is ready for review."

      - name: 🚨 Notify about failures
        if: needs.quality.result != 'success'
        run: |
          echo "❌ Some quality checks failed. Please review the logs and fix the issues."
          exit 1
