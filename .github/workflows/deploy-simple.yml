name: 🚀 Simple Deploy (Low Memory VPS)

on:
  workflow_dispatch:  # Только ручной запуск
    inputs:
      skip_build:
        description: 'Skip Docker build (use pre-built images)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🔄 Deploy to VPS (Simple)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        command_timeout: 30m
        script: |
          echo "🚀 Starting simple deployment..."

          # Переходим в папку проекта
          cd /opt/telesite

          # Увеличиваем swap если нужно
          echo "💾 Checking swap..."
          FREE_MEM=$(free -m | awk 'NR==2{print $4}')
          if [ $FREE_MEM -lt 1000 ]; then
            echo "⚠️ Low memory detected, ensuring swap is enabled..."
            sudo swapon /swapfile 2>/dev/null || true
          fi

          # Получаем последние изменения
          echo "🔄 Pulling latest changes..."
          git pull origin main

          # Останавливаем контейнеры
          echo "⏹️ Stopping containers..."
          docker-compose -f docker-compose.ssl.yml down

          # Очищаем память
          echo "🧹 Cleaning up to free memory..."
          docker system prune -f
          sync && echo 3 | sudo tee /proc/sys/vm/drop_caches

          # Если не пропускаем сборку
          if [ "${{ github.event.inputs.skip_build }}" != "true" ]; then
            echo "🔨 Building with Dockerfile.simple..."
            docker-compose -f docker-compose.ssl.yml build --build-arg DOCKERFILE=Dockerfile.simple
          else
            echo "⏭️ Skipping build, using existing images..."
          fi

          # Запускаем контейнеры
          echo "🚀 Starting containers..."
          docker-compose -f docker-compose.ssl.yml up -d

          # Проверяем статус
          echo "✅ Checking deployment status..."
          sleep 15
          docker-compose -f docker-compose.ssl.yml ps

          # Простая проверка
          echo "🏥 Quick health check..."
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3011/health || echo " Backend: Failed"
          echo ""

          echo "✅ Simple deployment completed!"
