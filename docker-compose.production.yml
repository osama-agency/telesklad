version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: telesite
      POSTGRES_USER: telesite_user
      POSTGRES_PASSWORD: TeleS1te_2025_SecurePass!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telesite_user"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.simple
    ports:
      - "3000:3000"  # Expose app directly to host nginx
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://telesite_user:TeleS1te_2025_SecurePass!@postgres:5432/telesite?schema=public
      - NEXTAUTH_SECRET=TeleS1te_NextAuth_2025_SecureSecret_Key!
      - NEXTAUTH_URL=https://dsgrating.ru
      - BACKEND_URL=http://localhost:3011
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "start-production-simple.js"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
