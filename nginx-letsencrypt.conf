events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Редирект с HTTP на HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name dsgrating.ru www.dsgrating.ru;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS сервер
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name dsgrating.ru www.dsgrating.ru;

        # SSL сертификаты от Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/dsgrating.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dsgrating.ru/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Статические файлы WebApp
        location /telegram-webapp/ {
            alias /opt/telesite/public/telegram-webapp/;
            try_files $uri $uri/ =404;

            # Заголовки для WebApp
            add_header X-Frame-Options "ALLOWALL" always;
            add_header Access-Control-Allow-Origin "*" always;

            # MIME типы
            location ~* \.(html|htm)$ {
                add_header Content-Type "text/html; charset=utf-8" always;
            }
        }

        # Проксирование к Next.js приложению
        location / {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # API проксирование к backend
        location /api/ {
            proxy_pass http://app:3011;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        # Логи
        access_log /var/log/nginx/dsgrating.ru.access.log;
        error_log /var/log/nginx/dsgrating.ru.error.log;
    }
}
