services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: telesite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: TeleS1te_2025_SecurePass!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.simple
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:TeleS1te_2025_SecurePass!@postgres:5432/telesite
      NEXTAUTH_SECRET: your-secret-key-here-change-in-production
      NEXTAUTH_URL: http://dsgrating.ru
      BACKEND_URL: http://localhost:3011
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_RECIPIENTS: ${TELEGRAM_RECIPIENTS:-125861752,795960178}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./public/telegram-webapp:/opt/telesite/public/telegram-webapp

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-http.conf:/etc/nginx/nginx.conf:ro
      - ./public/telegram-webapp:/opt/telesite/public/telegram-webapp:ro
    depends_on:
      - app

volumes:
  postgres_data:
